<style>
*,*::before,*::after{box-sizing:border-box;}
html,body{margin:0;padding:0;background:#000;}
body{
  font-family:'Urbanist',sans-serif;
  overflow-x:hidden;
  width:100%;
}
body.is-loading{
  overflow:hidden;
}
::selection{background:rgba(84,104,212,.5);color:transparent;}

#scale-outer{
  position:relative;
  width:100%;
  background:#000;
  overflow:hidden;
}
#design{
  position:absolute;
  top:0;left:0;
  width:1920px;
  height:47268px;
  transform-origin:top left;
  background:#000;
}
.slice{
  position:absolute;
  left:0;
  width:1920px;
  display:block;
  user-select:none;
  -webkit-user-drag:none;
  pointer-events:none;
  opacity:0;
  transition:opacity .6s ease;
}
.slice.loaded{
  opacity:1;
}

/* Shimmer placeholders behind each slice */
.slice-placeholder{
  position:absolute;
  left:0;
  width:1920px;
  overflow:hidden;
  background:#111;
}
.slice-placeholder::after{
  content:'';
  position:absolute;
  inset:0;
  background:linear-gradient(
    90deg,
    transparent 0%,
    rgba(255,255,255,.04) 40%,
    rgba(255,255,255,.07) 50%,
    rgba(255,255,255,.04) 60%,
    transparent 100%
  );
  background-size:200% 100%;
  animation:shimmer 1.8s ease-in-out infinite;
}
@keyframes shimmer{
  0%{background-position:200% 0}
  100%{background-position:-200% 0}
}

/* Loading screen */
#loader-overlay{
  position:fixed;
  inset:0;
  z-index:99999;
  background:#000;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  transition:opacity .5s ease, visibility .5s ease;
}
#loader-overlay.hidden{
  opacity:0;
  visibility:hidden;
  pointer-events:none;
}
#loader-overlay img{
  width:80px;
  height:80px;
  margin-bottom:32px;
  animation:pulse-logo 1.6s ease-in-out infinite;
}
@keyframes pulse-logo{
  0%,100%{opacity:.6;transform:scale(1)}
  50%{opacity:1;transform:scale(1.06)}
}
#loader-bar-track{
  width:180px;
  height:3px;
  border-radius:3px;
  background:rgba(255,255,255,.1);
  overflow:hidden;
}
#loader-bar-fill{
  height:100%;
  width:0%;
  border-radius:3px;
  background:linear-gradient(90deg,rgba(84,104,212,.8),rgba(140,160,255,.9));
  transition:width .3s ease;
}
#loader-text{
  margin-top:14px;
  font-family:'Urbanist',sans-serif;
  font-size:13px;
  font-weight:400;
  letter-spacing:.06em;
  color:rgba(255,255,255,.35);
}

/* Email / phone: selectable text only, not clickable, not a link */
.txt-select{
  position:absolute;
  margin:0;padding:0;
  color:transparent;
  white-space:pre;
  line-height:1.15;
  cursor:text;
  user-select:text;
  -webkit-user-select:text;
  -moz-user-select:text;
}

/* Header nav words: clickable hit areas, not selectable as text */
.nav-hit{
  position:absolute;
  display:inline-block;
  color:transparent;
  white-space:pre;
  line-height:1.15;
  text-decoration:none;
  cursor:pointer;
  user-select:none;
  -webkit-user-select:none;
  -moz-user-select:none;
  padding:12px 10px;
  margin:-12px -10px;
}
.nav-hit::after{
  content:'';
  position:absolute;
  left:10px;right:10px;bottom:9px;
  height:2px;
  background:rgba(255,255,255,.65);
  transform:scaleX(0);
  transform-origin:left;
  transition:transform .25s ease;
}
.nav-hit:hover::after,
.nav-hit:focus-visible::after{transform:scaleX(1);}
.nav-hit:focus-visible{outline:2px solid rgba(255,255,255,.6);outline-offset:6px;border-radius:2px;}

.sr-only{
  position:absolute;width:1px;height:1px;padding:0;margin:-1px;
  overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0;
}

/* Scroll-to-top button */
#scroll-top-btn{
  position:fixed;
  bottom:32px;
  right:32px;
  z-index:9999;
  width:48px;
  height:48px;
  border:none;
  border-radius:50%;
  background:rgba(255,255,255,.12);
  backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);
  border:1px solid rgba(255,255,255,.18);
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  opacity:0;
  visibility:hidden;
  transform:translateY(16px);
  transition:opacity .35s ease, visibility .35s ease, transform .35s ease, background .25s ease;
}
#scroll-top-btn.visible{
  opacity:1;
  visibility:visible;
  transform:translateY(0);
}
#scroll-top-btn:hover{
  background:rgba(255,255,255,.22);
  transform:translateY(-3px);
}
#scroll-top-btn:active{
  transform:translateY(0);
}
#scroll-top-btn svg{
  width:22px;
  height:22px;
  fill:none;
  stroke:rgba(255,255,255,.85);
  stroke-width:2.2;
  stroke-linecap:round;
  stroke-linejoin:round;
  transition:stroke .25s ease;
}
#scroll-top-btn:hover svg{
  stroke:#fff;
}
</style>

<script>
(function(){
  var DESIGN_W = 1920, DESIGN_H = 47268;
  var design = document.getElementById('design');
  var outer = document.getElementById('scale-outer');
  var scaleVal = 1;

  function applyScale(){
    scaleVal = window.innerWidth / DESIGN_W;
    design.style.transform = 'scale(' + scaleVal + ')';
    outer.style.height = Math.ceil(DESIGN_H * scaleVal) + 'px';
  }
  applyScale();
  window.addEventListener('resize', applyScale);

  /* ── Loading screen ── */
  var overlay  = document.getElementById('loader-overlay');
  var barFill  = document.getElementById('loader-bar-fill');
  var slices   = document.querySelectorAll('.slice');
  var total    = slices.length;
  var loaded   = 0;
  var dismissed = false;

  // Lock scroll during load
  document.body.classList.add('is-loading');

  function onSliceLoad(img){
    img.classList.add('loaded');
    loaded++;
    var pct = Math.round((loaded / total) * 100);
    barFill.style.width = pct + '%';

    // Dismiss only when ALL slices are loaded
    if(loaded >= total) dismissLoader();
  }

  function dismissLoader(){
    if(dismissed) return;
    dismissed = true;
    barFill.style.width = '100%';
    overlay.classList.add('hidden');
    document.body.classList.remove('is-loading');
    // Remove from DOM after animation
    setTimeout(function(){ overlay.remove(); }, 600);
  }

  slices.forEach(function(img){
    if(img.complete && img.naturalWidth > 0){
      onSliceLoad(img);
    } else {
      img.addEventListener('load', function(){ onSliceLoad(img); });
      img.addEventListener('error', function(){ onSliceLoad(img); });
    }
  });

  // Safety timeout — dismiss after 120s max for very slow connections
  setTimeout(function(){
    if(!dismissed) dismissLoader();
  }, 120000);

  /* ── Navigation ── */
  var sections = {
    'branding': 1270,
    'social-media': 14780,
    'print': 21515,
    'web-design': 26925,
    'logofolio': 44330
  };

  document.querySelectorAll('.nav-hit').forEach(function(a){
    a.addEventListener('click', function(e){
      e.preventDefault();
      var y = sections[a.getAttribute('data-target')];
      if(y === undefined) return;
      var targetY = Math.max(0, y * scaleVal - 24);
      window.scrollTo({top: targetY, behavior:'smooth'});
    });
  });

  /* ── Scroll-to-top button ── */
  var scrollBtn = document.getElementById('scroll-top-btn');
  var showThreshold = 400;
  function toggleScrollBtn(){
    if(window.scrollY > showThreshold){
      scrollBtn.classList.add('visible');
    } else {
      scrollBtn.classList.remove('visible');
    }
  }
  window.addEventListener('scroll', toggleScrollBtn, {passive:true});
  toggleScrollBtn();

  scrollBtn.addEventListener('click', function(){
    window.scrollTo({top:0, behavior:'smooth'});
  });
})();
</script>
